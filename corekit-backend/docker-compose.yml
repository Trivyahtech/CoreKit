version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: corekit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: corekit
    ports:
      - "5432:5432"
    volumes:
      - corekit_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: corekit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - corekit_redis_data:/data

volumes:
  corekit_postgres_data:
  corekit_redis_data:
